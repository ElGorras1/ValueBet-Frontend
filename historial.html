<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValueBet AI - Historial Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bookie-bg { background-color: #121212; }
        .panel-bg { background-color: #1e1e1e; border: 1px solid #333; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body class="bookie-bg text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-[#0a0a0a] border-b border-yellow-500/50 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-bolt text-yellow-500 text-2xl"></i>
            <div>
                <h1 class="text-xl font-black tracking-wide text-white">ValueBet <span class="text-yellow-500">PRO</span></h1>
                <p class="text-[9px] text-gray-400 uppercase tracking-widest">Motor Multi-Mercado Analítico v4.0</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-xs font-bold uppercase tracking-wider">
            <a href="index.html" class="text-gray-400 hover:text-white transition pb-1">Cupón Principal</a>
            <a href="tendencias.html" class="text-gray-400 hover:text-white transition pb-1">Stats Radar</a>
            <span class="text-yellow-500 border-b-2 border-yellow-500 pb-1 cursor-pointer">Historial Cloud</span>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full flex flex-col gap-6">
        <div class="flex justify-between items-center border-b border-[#333] pb-4">
            <div>
                <h2 class="text-xl font-black text-white uppercase tracking-wide">Auditorías Guardadas</h2>
                <p class="text-xs text-gray-400">Registros de valor matemático recuperados en tiempo real desde MongoDB Atlas</p>
            </div>
            <button onclick="cargarHistorial()" class="bg-[#242424] hover:bg-[#333] border border-[#444] text-xs font-bold px-3 py-2 rounded transition flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Sincronizar Nube
            </button>
        </div>

        <div id="contenedor_historial" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-1 md:col-span-2 text-center py-12 opacity-50">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-yellow-500"></i>
                <p class="text-xs">Conectando con el clúster NoSQL...</p>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            cargarHistorial();
        };

        async function cargarHistorial() {
            const contenedor = document.getElementById('contenedor_historial');
            try {
                const response = await fetch('http://localhost:8000/historial_tickets');
                if (!response.ok) throw new Error("Error en el servidor");
                
                const tickets = await response.json();
                
                if (tickets.length === 0) {
                    contenedor.innerHTML = `
                        <div class="col-span-1 md:col-span-2 text-center py-12 opacity-50">
                            <i class="fa-solid fa-folder-open text-4xl mb-3"></i>
                            <p class="text-xs">No hay auditorías guardadas en tu clúster todavía.</p>
                        </div>`;
                    return;
                }

                let html = '';
                tickets.forEach(t => {
                    const fecha = new Date(t.fecha_analisis).toLocaleString('es-ES', {
                        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    
                    const dictamen = t.dictamen_ia;
                    
                    // Construir mini viñetas para los mercados que tenían valor
                    let mercadosHTML = '';
                    if (dictamen.picks_valor && dictamen.picks_valor.length > 0) {
                        dictamen.picks_valor.forEach(pick => {
                            mercadosHTML += `
                                <div class="bg-[#1a1a1a] p-2 rounded border border-[#2a2a2a] flex justify-between items-center">
                                    <div>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase">${pick.mercado}</p>
                                        <p class="text-xs font-bold text-white">${pick.seleccion}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-sm font-black text-yellow-500">${pick.cuota}</p>
                                        <p class="text-[8px] text-emerald-400">EV: ${pick.ev}</p>
                                    </div>
                                </div>`;
                        });
                    } else {
                        mercadosHTML = `<p class="text-xs text-red-400 italic"><i class="fa-solid fa-hand mr-1"></i> El algoritmo recomendó ignorar este partido (Sin valor).</p>`;
                    }

                    html += `
                        <div class="panel-bg p-4 rounded-lg shadow-md border-t-2 border-t-yellow-500/30 flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="bg-gray-800 text-gray-400 text-[9px] uppercase tracking-wider px-2 py-0.5 rounded font-mono font-bold">${t.competicion}</span>
                                    <h3 class="text-base font-black text-white mt-1">${t.partido}</h3>
                                </div>
                                <span class="text-[10px] text-gray-500 font-mono">${fecha}</span>
                            </div>
                            
                            <div class="space-y-1.5 my-3">
                                ${mercadosHTML}
                            </div>
                            
                            <div class="border-t border-[#2a2a2a] pt-3 mt-2 flex justify-between items-center text-xs">
                                <span class="text-gray-400">Inversión Sugerida (Kelly): <strong class="text-blue-400">${dictamen.kelly_pct}%</strong></span>
                                <span class="font-black text-emerald-400 bg-emerald-950/30 px-2 py-1 rounded border border-emerald-900/50">$${dictamen.stake_usd}</span>
                            </div>
                        </div>`;
                });

                contenedor.innerHTML = html;

            } catch (error) {
                contenedor.innerHTML = `
                    <div class="col-span-1 md:col-span-2 text-center py-12 text-red-400">
                        <i class="fa-solid fa-circle-exclamation text-4xl mb-3"></i>
                        <p class="text-xs">Error de comunicación con la API de Python o el clúster de Atlas.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
